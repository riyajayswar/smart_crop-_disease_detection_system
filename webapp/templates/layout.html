<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        AgriVision AI
        {% endblock %}
    </title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Global CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/global.css') }}">

    <!-- Page Specific CSS -->
    {% block styles %}
    {% endblock %}

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            🌱 AgriVision AI
        </div>

        <div class="nav-links">

            <a href="/">
                Home
            </a>

            <a href="/dashboard">
                Dashboard
            </a>

            <a href="/detect">
                Detection
            </a>

            <a href="/analytics">
                Analytics
            </a>

            <a href="/assistant">
                AI Assistant
            </a>

        </div>

    </nav>

    <!-- PAGE CONTENT -->

    <main class="main-container">

        {% block content %}
        {% endblock %}

    </main>

    <!-- PAGE SPECIFIC JS -->

    {% block scripts %}
    {% endblock %}

</body>

</html>
